<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crop Water Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --soil: #3b2a1a;
      --leaf: #4a7c59;
      --leaf-light: #7ab893;
      --water: #5b9bd5;
      --water-light: #a8d0f0;
      --sun: #e8c84a;
      --bg: #f5f0e8;
      --card: #fffdf7;
      --text: #2a1f12;
      --muted: #7a6a58;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 10% 20%, rgba(74,124,89,0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 75%, rgba(91,155,213,0.1) 0%, transparent 50%);
      font-family: 'DM Mono', monospace;
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.7s ease both;
    }

    header .badge {
      display: inline-block;
      background: var(--leaf);
      color: #fff;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.15;
      color: var(--soil);
    }

    header h1 span { color: var(--leaf); }

    header p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid rgba(74,124,89,0.18);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 18px rgba(59,42,26,0.07);
      animation: fadeUp 0.6s ease both;
    }

    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.2s; }
    .card:nth-child(4) { animation-delay: 0.3s; }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--soil);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card h2 .icon {
      width: 28px; height: 28px;
      background: var(--leaf);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }

    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid rgba(74,124,89,0.25);
      border-radius: 10px;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 1rem;
      transition: border-color 0.2s;
      appearance: none;
    }

    select:focus, input:focus {
      outline: none;
      border-color: var(--leaf);
    }

    .slider-wrap { margin-bottom: 1rem; }
    .slider-wrap .val {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--leaf);
      cursor: pointer;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem;
      background: var(--leaf);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn:hover { background: #3d6b4a; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .result-card {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, var(--soil) 0%, #5a3d26 100%);
      color: #fff;
      border: none;
    }

    .result-card h2 { color: var(--leaf-light); }
    .result-card h2 .icon { background: var(--leaf-light); }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }

    @media (max-width: 500px) { .results-grid { grid-template-columns: 1fr 1fr; } }

    .metric {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }

    .metric .val {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--sun);
      display: block;
    }

    .metric .lbl {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-top: 0.25rem;
    }

    .tip {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.07);
      border-left: 3px solid var(--leaf-light);
      border-radius: 0 8px 8px 0;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
    }

    .hidden { display: none; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0%   { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1);    opacity: 1; }
    }

    .result-card.show { animation: pop 0.4s ease both; }
  </style>
</head>
<body>
<header>
  <div class="badge">🌾 Agriculture Tool</div>
  <h1>Crop <span>Water</span> Calculator</h1>
  <p>Estimate daily & seasonal irrigation needs for your field</p>
</header>

<div class="container">
  <div class="grid">

    <!-- Crop Info -->
    <div class="card">
      <h2><span class="icon">🌿</span> Crop Details</h2>
      <label>Crop Type</label>
      <select id="cropType">
        <option value="wheat">Wheat</option>
        <option value="rice">Rice (Paddy)</option>
        <option value="maize">Maize / Corn</option>
        <option value="cotton">Cotton</option>
        <option value="sugarcane">Sugarcane</option>
        <option value="soybean">Soybean</option>
        <option value="potato">Potato</option>
        <option value="tomato">Tomato</option>
      </select>

      <label>Growth Stage</label>
      <select id="growthStage">
        <option value="initial">Initial (early growth)</option>
        <option value="development">Crop Development</option>
        <option value="mid">Mid-Season (peak)</option>
        <option value="late">Late Season</option>
      </select>

      <label>Field Area (hectares)</label>
      <input type="number" id="area" value="1" min="0.1" step="0.1"/>
    </div>

    <!-- Climate Info -->
    <div class="card">
      <h2><span class="icon">☀️</span> Climate & Soil</h2>

      <div class="slider-wrap">
        <label>Reference Evapotranspiration ET₀ <span class="val"><span id="etVal">5</span> mm/day</span></label>
        <input type="range" id="et0" min="1" max="12" step="0.5" value="5" oninput="document.getElementById('etVal').textContent=this.value"/>
      </div>

      <div class="slider-wrap">
        <label>Effective Rainfall <span class="val"><span id="rfVal">2</span> mm/day</span></label>
        <input type="range" id="rainfall" min="0" max="15" step="0.5" value="2" oninput="document.getElementById('rfVal').textContent=this.value"/>
      </div>

      <label>Soil Type</label>
      <select id="soilType">
        <option value="sandy">Sandy (low retention)</option>
        <option value="loam" selected>Loam (medium)</option>
        <option value="clay">Clay (high retention)</option>
        <option value="silty">Silty Loam</option>
      </select>

      <button class="btn" onclick="calculate()">⟳ Calculate Water Need</button>
    </div>

    <!-- Results (hidden initially) -->
    <div class="card result-card hidden" id="results">
      <h2><span class="icon" style="background:var(--sun);font-size:0.85rem">💧</span> Irrigation Results</h2>
      <div class="results-grid">
        <div class="metric"><span class="val" id="rKc">—</span><div class="lbl">Crop Coeff. (Kc)</div></div>
        <div class="metric"><span class="val" id="rEtc">—</span><div class="lbl">ETc mm/day</div></div>
        <div class="metric"><span class="val" id="rNet">—</span><div class="lbl">Net Need mm/day</div></div>
        <div class="metric"><span class="val" id="rVol">—</span><div class="lbl">Volume m³/day</div></div>
        <div class="metric"><span class="val" id="rSeason">—</span><div class="lbl">Season Total m³</div></div>
        <div class="metric"><span class="val" id="rFreq">—</span><div class="lbl">Irrigation Freq.</div></div>
      </div>
      <div class="tip" id="tipText"></div>
    </div>

  </div>
</div>

<script>
  const cropData = {
    wheat:     { initial:0.3, development:0.7, mid:1.15, late:0.4, season:120, name:"Wheat" },
    rice:      { initial:1.05, development:1.2, mid:1.2, late:0.9, season:150, name:"Rice" },
    maize:     { initial:0.3, development:0.7, mid:1.2, late:0.6, season:125, name:"Maize" },
    cotton:    { initial:0.35, development:0.75, mid:1.2, late:0.6, season:195, name:"Cotton" },
    sugarcane: { initial:0.4, development:0.8, mid:1.25, late:0.75, season:365, name:"Sugarcane" },
    soybean:   { initial:0.4, development:0.8, mid:1.15, late:0.5, season:135, name:"Soybean" },
    potato:    { initial:0.5, development:0.75, mid:1.15, late:0.75, season:105, name:"Potato" },
    tomato:    { initial:0.6, development:0.75, mid:1.15, late:0.8, season:135, name:"Tomato" },
  };

  const soilFreq = { sandy:"Every 2–3 days", loam:"Every 4–5 days", clay:"Every 6–8 days", silty:"Every 4–6 days" };
  const soilTip  = {
    sandy:"Sandy soil drains quickly — use drip irrigation and irrigate more frequently in smaller amounts.",
    loam:"Loam is ideal for most crops. Furrow or sprinkler irrigation works well.",
    clay:"Clay retains water longer but can cause waterlogging. Ensure good drainage and avoid over-irrigation.",
    silty:"Silty loam holds moisture well and responds great to flood or sprinkler irrigation."
  };

  function calculate() {
    const crop    = cropData[document.getElementById('cropType').value];
    const stage   = document.getElementById('growthStage').value;
    const area    = parseFloat(document.getElementById('area').value) || 1;
    const et0     = parseFloat(document.getElementById('et0').value);
    const rf      = parseFloat(document.getElementById('rainfall').value);
    const soil    = document.getElementById('soilType').value;

    const kc    = crop[stage];
    const etc   = (et0 * kc).toFixed(2);
    const net   = Math.max(0, (etc - rf)).toFixed(2);
    const vol   = (net * area * 10).toFixed(0);   // mm × ha × 10 = m³
    const seasonVol = (net * area * 10 * crop.season).toFixed(0);

    document.getElementById('rKc').textContent     = kc.toFixed(2);
    document.getElementById('rEtc').textContent    = etc;
    document.getElementById('rNet').textContent    = net;
    document.getElementById('rVol').textContent    = Number(vol).toLocaleString();
    document.getElementById('rSeason').textContent = Number(seasonVol).toLocaleString();
    document.getElementById('rFreq').textContent   = soilFreq[soil];
    document.getElementById('tipText').textContent =
      `💡 ${crop.name} tip: ${soilTip[soil]} Season length estimated at ${crop.season} days.`;

    const r = document.getElementById('results');
    r.classList.remove('hidden');
    r.classList.remove('show');
    void r.offsetWidth;
    r.classList.add('show');
  }
</script>
</body>
</html>
